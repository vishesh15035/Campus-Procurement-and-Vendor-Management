{% extends "base.html" %}
{% block content %}

<h3>📦 Purchase Requests</h3>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Dept</th>
                <th>Item</th>
                <th>Qty</th>
                <th>Status</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for r in requests %}
            <tr style="animation-delay: {{ loop.index0 * 0.05 }}s">
                <td><strong style="color:var(--accent-3)">#{{ r.request_id }}</strong></td>
                <td><span style="font-size:12px; font-weight:600; color:var(--text-muted)">{{ r.department.department_code }}</span></td>
                <td style="font-weight:500; color:var(--text-primary); text-align:left">{{ r.item_name }}</td>
                <td>{{ r.quantity }}</td>
                <td><span class="status-{{ r.status }}">{{ r.status }}</span></td>
                <td style="font-size:12px; color:var(--text-muted); white-space:nowrap">{{ r.request_date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
