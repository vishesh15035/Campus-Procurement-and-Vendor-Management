{% extends "base.html" %}
{% block content %}
<h2>Approval Dashboard</h2>
<table>
<tr><th>Item</th><th>Quantity</th><th>Action</th></tr>
{% for r in requests %}
<tr>
<td>{{ r.item_name }}</td>
<td>{{ r.quantity }}</td>
<td><a href="/approve/{{ r.request_id }}">Approve</a></td>
</tr>
{% endfor %}
</table>
{% endblock %}
