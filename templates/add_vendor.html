{% extends "base.html" %}
{% block content %}

<h3>🏢 Add New Vendor</h3>

<div class="form-card" style="max-width: 520px;">
    <form method="post" autocomplete="off">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
            <div class="form-group" style="grid-column: 1/-1;">
                <label>Vendor Company Name</label>
                <input type="text" name="name" placeholder="e.g. Acme Supplies Ltd." required>
            </div>
            <div class="form-group">
                <label>Contact Person</label>
                <input type="text" name="contact_person" placeholder="Full name" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="+91-XXXXXXXXXX" required>
            </div>
            <div class="form-group" style="grid-column: 1/-1;">
                <label>Email</label>
                <input type="email" name="email" placeholder="official@vendor.com" required>
            </div>
            <div class="form-group" style="grid-column: 1/-1;">
                <label>Address</label>
                <input type="text" name="address" placeholder="Full vendor address" required>
            </div>
            <div class="form-group">
                <label>GST Number</label>
                <input type="text" name="gst_no" placeholder="GSTIN" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" name="category" placeholder="e.g. IT Equipment" required>
            </div>
        </div>

        <div class="form-actions" style="margin-top:8px;">
            <button type="submit" class="btn-submit">💾 Save Vendor</button>
            <a href="{{ url_for('list_vendors') }}" class="btn-cancel">← Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
